# ═══════════════════════════════════════════════════════════════════════════════
# Nextcloud + HTTPS — для тестирования DLP в закрытой сети
#
# Запуск:
#   docker-compose up -d
#
# Адрес: https://IP_ХОСТА:8443
# Логин: admin / admin123 (при первом входе)
#
# Требования: Docker Desktop для Windows
# ═══════════════════════════════════════════════════════════════════════════════

version: "3.8"

services:
  # ── Nextcloud (backend) ──────────────────────────────────────────────────
  nextcloud:
    image: nextcloud:29-apache
    container_name: dlp-nextcloud
    restart: unless-stopped
    volumes:
      - nextcloud_data:/var/www/html
    environment:
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin123
      - NEXTCLOUD_TRUSTED_DOMAINS=*
      - OVERWRITEPROTOCOL=https
    networks:
      - dlp-net

  # ── Nginx reverse proxy (HTTPS termination) ─────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: dlp-nginx-https
    restart: unless-stopped
    ports:
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - nextcloud
    networks:
      - dlp-net

volumes:
  nextcloud_data:

networks:
  dlp-net:
    driver: bridge
